word: unitemized
type: adjective
definition_list:
  - text: a type of transaction, such as a campaign donation, that is not detailed on a campaign [filing](/filing/), meaning that the identity of the party is withheld; typically occurs when the amount of money linked to the transaction falls below [disclosure](/disclosure/) limits
    in_use:
      - text: But he also continued to spend money without providing receipts or identifying the date or recipient, with the unitemized spending growing to $365,399.08.
        source: The New York Times
        url: https://www.nytimes.com/2023/02/13/nyregion/george-santos-campaign-money.html
      - text: Campaign finance reports showed Repass spending $56,741 between July 22 and October 27. Of that amount, more than half — $33,721 — was listed as unitemized expenses of $50 or less, which is allowed under Kansas campaign finance regulations.
        source: KCUR
        url: http://kcur.org/news/2023-02-24/the-top-contender-to-lead-kansas-democrats-is-under-fire-over-campaign-spending-resume
      - text: That includes almost $3.3 million in unitemized donations from those giving less than $200. Those donations are often seen as a sign of a committee’s small-dollar operation.
        source: Battleground Wisconsin
        url: https://www.wispolitics.com/2026/wisconsin-dem-party-outraises-state-gop-6-1-through-federal-account/